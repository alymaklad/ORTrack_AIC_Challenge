DATA:
  SAMPLER_MODE: contest_curriculum
  MAX_SAMPLE_INTERVAL: 45
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  SEARCH:
    CENTER_JITTER: 2.0
    FACTOR: 4.0
    SCALE_JITTER: 0.15
    SIZE: 256
    NUMBER: 1
  STD:
  - 0.229
  - 0.224
  - 0.225
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 128
    NUMBER: 1
  CONTEST:
    MANIFEST: ${AIC_DATA_ROOT}/metadata/contestant_manifest.json
    DATA_ROOT: ${AIC_DATA_ROOT}
    SPLIT_FILE: data_specs/aic_contest_train.txt
    SPLIT_FILE_VAL: data_specs/aic_contest_val.txt
    FRAME_CACHE_DIR: ${AIC_DATA_ROOT}/frames_cache
    CURRICULUM_STAGE: 1
    TEMPORAL_STRATEGY: curriculum
    VELOCITY_AWARE: False
    VELOCITY_AWARE_PROB: 0.0
    HARD_SAMPLE_PROB: 0.15
    MIN_AREA_RATIO: 0.0003
    MIN_PAIR_AREA_RATIO: 0.0003
    MAX_MOTION_OBJ: 1.25
    MAX_SCALE_CHANGE: 1.0
    SIZE_BUCKET_WEIGHTS:
    - 0.30
    - 0.45
    - 0.20
    - 0.05
    MIN_VALID_FRAMES: 20
  TRAIN:
    DATASETS_NAME:
    - AIC_CONTEST
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 14000
  VAL:
    DATASETS_NAME:
    - AIC_CONTEST_VAL
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 1800
MODEL:
  PRETRAIN_FILE: model/ORTrack_AIC.pth.tar
  IS_DISTILL: False
  EXTRA_MERGER: False
  RETURN_INTER: False
  BACKBONE:
    TYPE: deit_tiny_patch16_224
    STRIDE: 16
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256
TRAIN:
  BACKBONE_MULTIPLIER: 0.03
  FREEZE_BACKBONE: False
  FREEZE_BACKBONE_EXCEPT_LAST_N: -1
  DROP_PATH_RATE: 0.1
  BATCH_SIZE: 16
  EPOCH: 16
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  GRAD_CLIP_NORM: 0.1
  LR: 0.00003
  LR_DROP_EPOCH: 12
  NUM_WORKER: 4
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 25
  SAVE_EVERY_EPOCH: True
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  VAL_EPOCH_INTERVAL: 2
  WEIGHT_DECAY: 0.0001
  AMP: True
TEST:
  EPOCH: 16
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 256
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 128
  POST_PROCESS:
    ENABLE: True
    SMOOTH_ALPHA: 0.85
    LOW_CONF_ALPHA: 0.55
    LOW_CONF_THRESHOLD: 0.20
    MAX_CENTER_JUMP_OBJ: 5.0
    MAX_SCALE_CHANGE: 2.0
    MIN_BOX_SIZE: 2.0
    TEMPLATE_UPDATE: False
    TEMPLATE_UPDATE_CONF: 0.60
    TEMPLATE_UPDATE_INTERVAL: 25
